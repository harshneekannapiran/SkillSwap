[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "skillswap-backend"
source = "backend"
builder = "NIXPACKS"

[[services]]
name = "skillswap-frontend"
source = "frontend"
builder = "NIXPACKS"
